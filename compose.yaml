services:
  nginx:
    image: nginx:1.31.0-alpine-slim
    container_name: nginx_master
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/etc/nginx/sites:ro
      - ./snippets:/etc/nginx/snippets:ro
      - /etc/ssl/cert.pem:/etc/ssl/cert.pem:ro
      - /etc/ssl/key.pem:/etc/ssl/key.pem:ro
      - /opt/nginx/portfolio:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    networks:
      - main_network

networks:
  main_network:
    external: true
